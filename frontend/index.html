<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>TaskFlow</title>
  <script type="module">
    import { getToken, clearToken } from "/js/auth.js";

    (async () => {
      const token = getToken();
      if (!token) { location.replace("/pages/login.html"); return; }
      try {
        const res = await fetch("/auth/me", { headers: { Authorization: "Bearer " + token } });
        if (res.status === 401) { clearToken(); location.replace("/pages/login.html"); return; }
        if (!res.ok) throw new Error("auth/me failed");
        const me = await res.json();
        if (me.current_team_id) {
          location.replace("/pages/board.html?team_id=" + me.current_team_id);
        } else {
          location.replace("/pages/teams.html");
        }
      } catch {
        location.replace("/pages/login.html");
      }
    })();
  </script>
</head>
<body></body>
</html>
