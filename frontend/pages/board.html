<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - 칸반</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen bg-slate-50">
  <header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
      <div class="flex items-center gap-4">
        <a href="/pages/teams.html" class="text-slate-500 hover:text-slate-900">← 팀</a>
        <h1 class="text-lg font-bold text-slate-800" id="teamTitle">팀 보드</h1>
      </div>
      <nav class="flex items-center gap-3 text-sm">
        <a id="chatLink" href="#" class="px-3 py-1.5 rounded-lg hover:bg-slate-100">채팅</a>
        <button id="logoutBtn" class="text-slate-500 hover:text-slate-900">로그아웃</button>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-6">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <section data-column="TODO" class="bg-white rounded-2xl shadow p-4 min-h-[60vh] flex flex-col">
        <header class="flex items-center justify-between mb-3">
          <h2 class="font-semibold text-slate-800">TODO</h2>
          <button class="add-btn text-blue-600 hover:bg-blue-50 rounded px-2" title="추가">+</button>
        </header>
        <div class="cards flex-1 space-y-2"></div>
      </section>

      <section data-column="DOING" class="bg-white rounded-2xl shadow p-4 min-h-[60vh] flex flex-col">
        <header class="flex items-center justify-between mb-3">
          <h2 class="font-semibold text-slate-800">DOING</h2>
          <button class="add-btn text-blue-600 hover:bg-blue-50 rounded px-2" title="추가">+</button>
        </header>
        <div class="cards flex-1 space-y-2"></div>
      </section>

      <section data-column="DONE" class="bg-white rounded-2xl shadow p-4 min-h-[60vh] flex flex-col">
        <header class="flex items-center justify-between mb-3">
          <h2 class="font-semibold text-slate-800">DONE</h2>
          <button class="add-btn text-blue-600 hover:bg-blue-50 rounded px-2" title="추가">+</button>
        </header>
        <div class="cards flex-1 space-y-2"></div>
      </section>
    </div>
  </main>

  <script type="module" src="/js/board.js"></script>
</body>
</html>
