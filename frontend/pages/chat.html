<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - 채팅</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">
  <header class="bg-white border-b">
    <div class="max-w-3xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
      <div class="flex items-center gap-4">
        <a href="/pages/teams.html" class="text-slate-500 hover:text-slate-900">← 팀</a>
        <h1 class="text-lg font-bold text-slate-800" id="teamTitle">팀 채팅</h1>
      </div>
      <nav class="flex items-center gap-3 text-sm">
        <a id="boardLink" href="#" class="px-3 py-1.5 rounded-lg hover:bg-slate-100">칸반</a>
        <button id="logoutBtn" class="text-slate-500 hover:text-slate-900">로그아웃</button>
      </nav>
    </div>
  </header>

  <main class="flex-1 max-w-3xl w-full mx-auto px-6 py-4 flex flex-col">
    <div id="messages" class="flex-1 overflow-y-auto bg-white rounded-2xl shadow p-4 space-y-2 min-h-[60vh]">
      <div class="text-slate-400 text-sm">로딩...</div>
    </div>

    <form id="sendForm" class="mt-4 flex gap-2">
      <input type="text" name="content" required maxlength="1000" autocomplete="off"
             placeholder="메시지를 입력하세요 (최대 1000자)"
             class="flex-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">전송</button>
    </form>
  </main>

  <script type="module" src="/js/chat.js"></script>
</body>
</html>
