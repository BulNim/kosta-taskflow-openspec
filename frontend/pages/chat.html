<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow · 채팅</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/tokens.css" />
</head>
<body class="min-h-screen flex flex-col" style="background:var(--color-bg)">
  <div id="appHeader"></div>

  <main class="flex-1 max-w-3xl w-full mx-auto px-4 md:px-6 py-4 md:py-6 flex flex-col">
    <div class="flex items-center justify-between mb-3">
      <h2 class="font-semibold">채팅</h2>
      <span class="flex items-center gap-1.5 text-xs" style="color:var(--color-primary)">
        <span class="w-2 h-2 rounded-full bg-emerald-500"></span> 5초마다 새로고침
      </span>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto bg-white rounded-2xl shadow-sm border p-4 space-y-3 min-h-[55vh]">
      <div class="text-slate-400 text-sm">로딩...</div>
    </div>

    <form id="sendForm" class="mt-4 flex gap-2">
      <input type="text" name="content" required maxlength="1000" autocomplete="off" placeholder="메시지 입력 (1000자 이내)..." class="input-base flex-1" />
      <button class="btn-primary">전송</button>
    </form>
  </main>

  <script type="module" src="/js/chat.js"></script>
</body>
</html>
