<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow · 멤버</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/tokens.css" />
</head>
<body class="min-h-screen" style="background:var(--color-bg)">
  <div id="appHeader"></div>

  <main class="max-w-3xl mx-auto px-4 md:px-6 py-4 md:py-6">
    <div class="bg-white rounded-2xl shadow-sm border p-4">
      <h2 class="font-semibold mb-3">팀 멤버</h2>
      <ul id="memberList" class="divide-y">
        <li class="py-3 text-sm text-slate-500">로딩...</li>
      </ul>
    </div>
  </main>

  <script type="module">
    import { api } from "/js/api.js";
    import { requireAuthOrRedirect } from "/js/auth.js";
    import { renderHeader } from "/js/header.js";
    import { toast } from "/js/toast.js";

    requireAuthOrRedirect();
    const params = new URLSearchParams(location.search);
    const teamId = params.get("team_id");
    if (!teamId) location.replace("/pages/teams.html");

    await renderHeader({ teamId, active: "members" });

    const list = document.getElementById("memberList");
    try {
      const members = await api(`/teams/${teamId}/members`);
      if (!members.length) {
        list.innerHTML = '<li class="py-3 text-sm text-slate-500">멤버가 없습니다.</li>';
      } else {
        list.innerHTML = members
          .map(
            (m) => `
              <li class="py-3 flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-[color:var(--color-primary)] text-white grid place-items-center font-semibold">
                  ${(m.email || "?").charAt(0).toUpperCase()}
                </div>
                <div>
                  <div class="font-medium">@${m.email.split("@")[0]}</div>
                  <div class="text-xs" style="color:var(--color-text-muted)">${m.email}</div>
                </div>
              </li>`
          )
          .join("");
      }
    } catch (err) {
      list.innerHTML = '<li class="py-3 text-sm text-red-600">멤버 목록을 불러오지 못했습니다.</li>';
      toast(err.msg);
    }
  </script>
</body>
</html>
