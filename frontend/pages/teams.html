<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow · 팀 선택</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/tokens.css" />
</head>
<body class="min-h-screen" style="background:var(--color-bg)">
  <header class="bg-white border-b">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <span class="font-bold text-[color:var(--color-primary)]">TaskFlow</span>
      <div class="text-sm flex items-center gap-3">
        <span id="userEmail" class="text-slate-500"></span>
        <button id="logoutBtn" class="text-slate-500 hover:text-slate-900">로그아웃</button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">
    <div id="emptyBanner" class="hidden mb-6 px-4 py-3 rounded-md flex items-center gap-2 text-sm border" style="background:var(--color-info-bg);border-color:var(--color-info-border);color:var(--color-info-fg)">
      <span>ℹ</span> 아직 팀에 소속되지 않았습니다. 팀을 만들거나 초대코드로 합류하세요.
    </div>

    <section class="mb-8 grid md:grid-cols-2 gap-6">
      <div class="bg-white rounded-2xl shadow-sm border-2 border-dashed border-slate-300 p-6">
        <h2 class="text-center font-semibold mb-4">+ 새 팀 만들기</h2>
        <form id="createForm" class="space-y-3">
          <input type="text" name="name" required maxlength="30" placeholder="팀 이름 (1–30자)" class="input-base" />
          <button class="btn-primary w-full">만들기</button>
        </form>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border-2 border-dashed border-slate-300 p-6">
        <h2 class="text-center font-semibold mb-4">초대코드로 합류</h2>
        <form id="joinForm" class="space-y-1">
          <input type="text" name="invite_code" required pattern="[A-Z0-9]{4}-[A-Z0-9]{4}" placeholder="ABCD-1234" class="input-base text-center tracking-widest font-mono uppercase" />
          <p class="text-xs text-center" style="color:var(--color-text-muted)">형식: 대문자 4 + 숫자 4 (하이픈 포함)</p>
          <button class="btn-accent w-full mt-2">합류</button>
        </form>
      </div>
    </section>

    <section>
      <h2 class="font-semibold text-slate-800 mb-3">내 팀</h2>
      <div id="teamList" class="grid sm:grid-cols-2 md:grid-cols-3 gap-4">
        <div class="text-slate-500 text-sm">로딩...</div>
      </div>
    </section>
  </main>

  <script type="module" src="/js/teams.js"></script>
</body>
</html>
