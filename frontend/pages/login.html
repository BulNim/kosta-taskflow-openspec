<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow · 로그인</title>
  <script>
    (function(){
      try {
        var v = localStorage.getItem("taskflow_theme");
        if (v !== "light" && v !== "dark") {
          v = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = v;
      } catch(_) {}
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/tokens.css" />
</head>
<body class="min-h-screen flex items-center justify-center px-4" style="background:var(--color-bg);color:var(--color-text)">
  <div id="floatingThemeToggle" class="fixed top-4 right-4 z-10"></div>
  <main class="w-full max-w-sm rounded-2xl shadow-md p-8" style="background:var(--color-surface)">
    <div class="flex justify-center mb-6">
      <span class="px-4 py-1.5 rounded-md bg-[color:var(--color-primary)] text-white font-semibold">TaskFlow</span>
    </div>
    <h1 class="text-2xl font-bold text-center mb-1" id="modeTitle">로그인</h1>
    <p class="text-sm text-center mb-6" style="color:var(--color-text-muted)" id="modeHint">팀에 입장하려면 로그인하세요</p>

    <form id="authForm" class="space-y-3" novalidate>
      <input type="email" name="email" required autocomplete="email" placeholder="이메일" class="input-base" />
      <input type="password" name="password" required minlength="8" autocomplete="current-password" placeholder="비밀번호 (8자 이상)" class="input-base" />
      <button type="submit" id="submitBtn" class="btn-primary w-full">로그인</button>
    </form>

    <div class="text-center text-sm mt-6">
      <span id="modeText" style="color:var(--color-text-muted)">계정이 없으신가요?</span>
      <button type="button" id="toggleMode" class="text-blue-600 hover:underline ml-1">회원가입</button>
    </div>
  </main>
  <script type="module">
    import { renderThemeToggle } from "/js/theme.js";
    renderThemeToggle(document.getElementById("floatingThemeToggle"), { compact: true });
  </script>
  <script type="module" src="/js/login.js"></script>
</body>
</html>
